<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo Squircle (Cuadrado redondeado) -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="#0f172a" />
  
  <!-- Círculos concéntricos blancos -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="white" stroke-width="25" />
  <circle cx="256" cy="256" r="80" fill="none" stroke="white" stroke-width="20" />
  <circle cx="256" cy="256" r="25" fill="white" />
  
  <!-- Líneas de mira (Target) -->
  <line x1="256" y1="70" x2="256" y2="130" stroke="white" stroke-width="20" stroke-linecap="round" />
  <line x1="256" y1="382" x2="256" y2="442" stroke="white" stroke-width="20" stroke-linecap="round" />
  <line x1="70" y1="256" x2="130" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" />
  <line x1="382" y1="256" x2="442" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" />
</svg>
