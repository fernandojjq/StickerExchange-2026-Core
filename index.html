  <style>
    body { background-color: #f8fafc; margin: 0; }
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

<body>
  <div id="initial-loader">
    <div class="spinner"></div>
    <p style="margin-top: 1rem; font-family: sans-serif; font-weight: 900; color: #1e293b; text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px;">Swap-26</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.APP_VERSION = "1.12.0";
    // Global function to remove loader
    window.removeInitialLoader = () => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    };
    // Safety timeout: remove loader after 5 seconds anyway
    setTimeout(window.removeInitialLoader, 5000);
  </script>
</body>
